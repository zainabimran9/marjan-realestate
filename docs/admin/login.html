<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login | Marjan Classic Mall & Residency</title>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="login-shell">
  <div class="login-card">
    <div class="brand" style="margin-bottom: 28px;">Marjan Classic<span>Admin Panel</span></div>
    <h2 style="font-size:1.5rem;">Sign in</h2>
    <p style="color:var(--ink-soft); font-size:.9rem; margin-bottom:24px;">Manage listings and inquiries for the site.</p>
    <form id="login-form">
      <div class="field" style="margin-bottom:14px;">
        <label for="username">Username</label>
        <input type="text" id="username" required autocomplete="username" />
      </div>
      <div class="field" style="margin-bottom:20px;">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Sign In</button>
      <p id="login-error" style="color:var(--coral); font-size:.85rem; margin-top:14px; display:none;"></p>
    </form>
    <a href="../index.html" style="display:block; margin-top:20px; font-size:.85rem; color:var(--ink-soft);">&larr; Back to site</a>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  // Already signed in? Skip straight to dashboard.
  if (localStorage.getItem("marjan_admin_token")) {
    window.location.href = "dashboard.html";
  }

  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errEl = document.getElementById("login-error");
    errEl.style.display = "none";
    const btn = e.target.querySelector("button[type=submit]");
    btn.disabled = true; btn.textContent = "Signing in…";
    try {
      const { token } = await Api.login(
        document.getElementById("username").value,
        document.getElementById("password").value
      );
      localStorage.setItem("marjan_admin_token", token);
      window.location.href = "dashboard.html";
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = "block";
    } finally {
      btn.disabled = false; btn.textContent = "Sign In";
    }
  });
</script>
</body>
</html>
